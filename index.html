<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Clement</title>
    <!-- tailwind -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-amber-100">
    <!-- HERO -->
    <section class="relative min-h-screen lg:h-screen">
      <!-- Desktop Hero -->
      <img
        src="images/hero.svg"
        alt="Hero Image"
        class="hidden lg:block absolute inset-0 w-full h-full object-cover"
      />

      <!-- Mobile & Tablet Hero -->
      <img
        src="images/Hero Image.svg"
        alt="Hero Image"
        class="block lg:hidden absolute inset-0 w-full h-full object-cover"
      />

      <!-- Dark Overlay -->
      <div class="absolute inset-0 bg-black/30"></div>

      <!-- ================= NAVBAR ================= -->

      <nav class="absolute top-0 left-0 w-full z-50">
        <div
          class="max-w-7xl mx-auto px-4 lg:px-10 py-4 flex items-center justify-between"
        >
          <!-- Logo -->
          <button>
            <img src="images/logo.svg" alt="Logo" class="h-14" />
          </button>

          <!-- Desktop Navigation -->
          <div class="hidden lg:flex items-center gap-8">
            <button
              class="text-white uppercase text-sm tracking-wider hover:text-red-500 transition"
            >
              LE CONCEPT
            </button>

            <button
              class="text-white uppercase text-sm tracking-wider hover:text-red-500 transition"
            >
              LES ÉDITIONS
            </button>

            <button
              class="text-white uppercase text-sm tracking-wider hover:text-red-500 transition"
            >
              COLLECTION
            </button>

            <button
              class="text-white uppercase text-sm tracking-wider hover:text-red-500 transition"
            >
              ROAD LEGENDS GARAGE
            </button>

            <button
              class="text-white uppercase text-sm tracking-wider hover:text-red-500 transition"
            >
              À PROPOS
            </button>
          </div>

          <!-- Desktop Right -->
          <div class="hidden lg:flex items-center gap-5">
            <button>
              <img src="images/Vector.svg" alt="User" class="w-5 h-5" />
            </button>

            <button
              class="bg-red-800 hover:bg-red-500 transition px-3 py-1 rounded-md text-white uppercase text-sm font-semibold"
            >
              REJOINDRE LE CLUB
            </button>
          </div>

          <!-- Mobile Right -->
          <div class="flex lg:hidden items-center gap-4">
            <button>
              <img src="images/Vector.svg" alt="User" class="w-5 h-5" />
            </button>
            <button id="menu-btn">
              <img
                id="menu-icon"
                src="images/burger-menu.svg"
                alt="Menu"
                class="w-8 h-8"
              />
            </button>
          </div>
        </div>

        <!-- Mobile Dropdown -->

        <div
          id="mobile-menu"
          class="hidden lg:hidden bg-black/90 backdrop-blur-sm"
        >
          <div class="flex flex-col px-8 py-6">
            <button
              class="text-white text-left py-4 hover:text-red-500 transition"
            >
              LE CONCEPT
            </button>

            <button
              class="text-white text-left py-4 hover:text-red-500 transition"
            >
              LES ÉDITIONS
            </button>

            <button
              class="text-white text-left py-4 hover:text-red-500 transition"
            >
              COLLECTION
            </button>

            <button
              class="text-white text-left py-4 hover:text-red-500 transition"
            >
              ROAD LEGENDS GARAGE
            </button>

            <button
              class="text-white text-left py-4 hover:text-red-500 transition"
            >
              À PROPOS
            </button>
          </div>
        </div>
      </nav>

      <!-- ================= HERO CONTENT ================= -->
      <div
        class="absolute inset-x-0 top-24 bottom-0 z-20 flex flex-col lg:flex-row lg:items-end lg:justify-between px-6 lg:px-10 pb-6 lg:pb-12"
      >
        <div
          class="h-full w-full flex flex-col items-start lg:flex-row lg:items-end lg:justify-between"
        >
          <!-- ================= Left Content ================= -->
          <div class="w-full lg:flex-1 text-white px-6">
            <!-- Desktop Title -->
            <h1
              class="hidden lg:block text-4xl font-bold uppercase leading-tight max-w-[340px] text-amber-100"
            >
              CHAQUE MOIS,<br />
              <span class="text-red-800">UNE LÉGENDE</span><br />
              DANS VOTRE<br />
              BOÎTE AUX LETTRES.
            </h1>

            <!-- Mobile & Tablet Title -->
            <h1
              class="block lg:hidden text-3xl md:text-5xl font-bold uppercase leading-tight text-amber-100"
            >
              CHAQUE MOIS,
              <span class="text-red-800">UNE LÉGENDE</span><br />
              DANS VOTRE BOÎTE AUX <br />
              LETTRES.
            </h1>

            <p
              class="mt-3 text-sm md:text-base lg:text-base text-gray-200 leading-relaxed"
            >
              Recevez une enveloppe collector dédiée aux <br />
              automobiles qui ont marqué leur époque.
            </p>

            <!-- Buttons -->
            <div
              class="mt-6 flex flex-col lg:flex-row lg:items-center gap-4 lg:gap-6"
            >
              <button
                class="bg-red-800 hover:bg-red-700 transition px-4 py-2 rounded-md uppercase font-semibold w-full lg:w-fit"
              >
                REJOINDRE LE CLUB
              </button>

              <button
                class="flex items-center justify-center gap-3 uppercase font-medium hover:text-red-500 transition w-fit mx-auto lg:mx-0"
              >
                DÉCOUVRIR LE CONTENU

                <img src="images/down_arrow.svg" alt="Arrow" class="w-5 h-5" />
              </button>
            </div>
          </div>

          <!-- ================= Right Card ================= -->
          <div
            class="w-full lg:w-[420px] mt-10 lg:mt-0 bg-black backdrop-blur-md rounded-2xl p-5 text-white grid grid-cols-[120px_1fr] gap-5"
          >
            <!-- Left Image -->
            <img
              src="images/Car Image.svg"
              alt=""
              class="w-full h-full object-cover rounded-lg"
            />

            <!-- Right Content -->
            <div class="flex flex-col">
              <h3 class="text-xl font-bold">205 GTI 1.9</h3>

              <p class="text-sm uppercase text-gray-300 mt-1">
                ÉCOUTER LE MOTEUR
              </p>

              <!-- Audio -->
              <div class="grid grid-cols-4 gap-2 mt-4">
                <button
                  class="bg-red-800 rounded-full w-10 h-10 flex items-center justify-center"
                >
                  <img src="images/pause.svg" alt="" class="w-4" />
                </button>

                <img src="images/sound.svg" alt="" class="col-span-3 w-full" />
              </div>

              <!-- Bottom Image -->
              <img
                src="images/Sound Progress Info 3.svg"
                alt=""
                class="w-full mt-4"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="index.js"></script>
  </body>
</html>
